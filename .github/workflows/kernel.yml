name: Fandi-Earth Stable Gaming Lite Kernel

on:
  workflow_dispatch:
    inputs:
      repository:
        description: 'Repo'
        required: true
        default: 'kerenpandi71-collab/android_kernel_xiaomi_earth'
      branch:
        description: 'Branch'
        required: true
        default: '16.2'
      defconfig:
        description: 'Defconfig'
        required: true
        default: 'earth_defconfig'
      zipname:
        description: 'zip name'
        required: false
        default: 'Fandi-Earth-GamingLite'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        repository: ${{ github.event.inputs.repository }}
        ref: ${{ github.event.inputs.branch }}
        submodules: recursive

    - name: Setup Build Environment
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libncurses-dev bison flex libssl-dev libelf-dev bc zip \
        gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi python3 python-is-python3 git wget curl \
        clang-18 lld-18

    - name: Build Kernel (Gaming Lite Stable)
      run: |
        export PATH=/usr/lib/llvm-18/bin:$PATH
        export ARCH=arm64
        export KBUILD_BUILD_USER="fandi"
        export KBUILD_BUILD_HOST="kerenpandi71"

        ARGS="O=out ARCH=arm64 \
          CC=clang-18 \
          LD=ld.lld-18 \
          AR=llvm-ar \
          NM=llvm-nm \
          STRIP=llvm-strip \
          OBJCOPY=llvm-objcopy \
          OBJDUMP=llvm-objdump \
          CROSS_COMPILE=aarch64-linux-gnu- \
          CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
          LLVM=1 \
          LLVM_IAS=1"

        # Load base defconfig
        make $ARGS ${{ github.event.inputs.defconfig }}

        # ==============================
        # GAMING + BATTERY + NETWORK OPT
        # ==============================
        cat >> out/.config << 'EOF'

# RAM + scheduling efficiency
CONFIG_PREEMPT=y
CONFIG_HZ_300=y
CONFIG_CPU_FREQ_GOV_SCHEDUTIL=y
CONFIG_CPU_IDLE=y
CONFIG_ENERGY_MODEL=y

# memory + stability
CONFIG_DEVTMPFS=y
CONFIG_DEVTMPFS_MOUNT=y
CONFIG_OVERLAY_FS=y
CONFIG_FUSE_FS=y

# namespaces (DroidSpace safe)
CONFIG_NAMESPACES=y
CONFIG_PID_NS=y
CONFIG_IPC_NS=y
CONFIG_NET_NS=y
CONFIG_UTS_NS=y

# cgroup (performance control)
CONFIG_CGROUPS=y
CONFIG_MEMCG=y
CONFIG_BLK_CGROUP=y

# security (no overhead tinggi)
CONFIG_SECCOMP=y
CONFIG_SECCOMP_FILTER=y

# network gaming optimization
CONFIG_TCP_CONG_BBR=y
CONFIG_NET_SCH_FQ=y
CONFIG_NET_SCH_FQ_CODEL=y

# wireless + tunnel
CONFIG_WIREGUARD=y
CONFIG_TUN=y

# system info (safe debug)
CONFIG_IKCONFIG=y
CONFIG_IKCONFIG_PROC=y
EOF

        # Resolve config
        make $ARGS olddefconfig

        # Build kernel
        make -j$(nproc) $ARGS 2>&1 | tee compile.log

    - name: Verify Gaming Features
      run: |
        echo "=== GAMING LITE CHECK ==="
        grep -E "CONFIG_TCP_CONG_BBR|CONFIG_NET_SCH_FQ|CONFIG_PREEMPT|CONFIG_HZ_300|CONFIG_MEMCG" out/.config || true
        echo "========================="

    - name: Package Anykernel3
      run: |
        if [ -f out/arch/arm64/boot/Image.gz ]; then
          gunzip -c out/arch/arm64/boot/Image.gz > out/arch/arm64/boot/Image
        fi

        git clone https://github.com/AbuRider/Anykernel3 Anykernel3

        cp out/arch/arm64/boot/Image Anykernel3/ 2>/dev/null || true
        cp out/arch/arm64/boot/dts/mediatek/mt6768.dtb Anykernel3/ 2>/dev/null || true
        cp out/arch/arm64/boot/dts/mediatek/earth.dtbo Anykernel3/ 2>/dev/null || true

        cd Anykernel3
        zip -r9 "../${{ github.event.inputs.zipname }}-gaminglite.zip" . -x ".git*"
        cd ..

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Gaming-Lite-Kernel
        path: |
          *.zip
          compile.log
          out/.config
