name: SUSFS + DroidSpace Build

on:
  workflow_dispatch:
    inputs:
      repository:
        description: 'Repo'
        required: true
        default: 'kerenpandi71-collab/android_kernel_xiaomi_earth'
      branch:
        description: 'Branch'
        required: true
        default: '16.2'
      defconfig:
        description: 'Defconfig'
        required: true
        default: 'earth_defconfig'
      zipname:
        description: 'zip name'
        required: false
        default: 'Fandi-Earth'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        repository: ${{ github.event.inputs.repository }}
        ref: ${{ github.event.inputs.branch }}
        submodules: recursive

    - name: Setup Build Environment
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libncurses-dev bison flex libssl-dev libelf-dev bc zip gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi python3 python-is-python3 git wget curl

        # Install Clang dari APT (lebih stabil)
        sudo apt-get install -y clang-18 lld-18
        export PATH=/usr/lib/llvm-18/bin:$PATH
        export CC=clang-18
        export LD=ld.lld-18

        # SUSFS (tanpa KernelSU)
        git clone --depth=1 -b kernel-4.19 https://gitlab.com/simonpunk/susfs4ksu.git susfs
        cp susfs/kernel_patches/50_add_susfs_in_kernel-4.19.patch ./
        cp susfs/kernel_patches/fs/susfs.c fs/ || true
        cp susfs/kernel_patches/include/linux/susfs.h include/linux/ || true
        patch -p1 < 50_add_susfs_in_kernel-4.19.patch || true

        export ARCH=arm64
        export KBUILD_BUILD_USER="fandi"
        export KBUILD_BUILD_HOST="kerenpandi71"
        ARGS="O=out ARCH=arm64 CC=clang-18 LD=ld.lld-18 AR=llvm-ar NM=llvm-nm STRIP=llvm-strip OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi- LLVM=1 LLVM_IAS=1"

        make $ARGS ${{ github.event.inputs.defconfig }}
        # Tambahkan konfigurasi yang diperlukan
        echo "CONFIG_SUSFS=y" >> out/.config
        echo "CONFIG_DEVTMPFS=y" >> out/.config
        echo "CONFIG_DEVTMPFS_MOUNT=y" >> out/.config
        echo "CONFIG_IPC_NS=y" >> out/.config
        echo "CONFIG_POSIX_MQUEUE=y" >> out/.config
        echo "CONFIG_SYSVIPC=y" >> out/.config
        make $ARGS olddefconfig

        make -j$(nproc) $ARGS 2>&1 | tee compile.log

    - name: Packing Anykernel3
      run: |
        if [ ! -f out/arch/arm64/boot/Image ]; then
          cp out/arch/arm64/boot/Image.gz out/arch/arm64/boot/Image || true
        fi
        if [ -f out/arch/arm64/boot/Image ]; then
          git clone https://github.com/AbuRider/Anykernel3 Anykernel3
          cp out/arch/arm64/boot/Image Anykernel3/
          cp out/arch/arm64/boot/dts/mediatek/mt6768.dtb Anykernel3/dtb || true
          cd Anykernel3
          zip -r9 "../${{ github.event.inputs.zipname }}-$(date +%Y%m%d).zip" * -x '.git*'
          cd ..
        fi

    - name: Upload Artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: Build-Result
        path: |
          *.zip
          compile.log
