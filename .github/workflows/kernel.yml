name: SUSFS + DroidSpace Build

on:
  workflow_dispatch:
    inputs:
      repository:
        description: 'Repo'
        required: true
        default: 'kerenpandi71-collab/android_kernel_xiaomi_earth'
      branch:
        description: 'Branch'
        required: true
        default: '16.2'
      defconfig:
        description: 'Defconfig'
        required: true
        default: 'earth_defconfig'
      zipname:
        description: 'zip name'
        required: false
        default: 'Fandi-Earth'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        repository: ${{ github.event.inputs.repository }}
        ref: ${{ github.event.inputs.branch }}
        submodules: recursive

    - name: Setup Build Environment
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libncurses-dev bison flex libssl-dev libelf-dev bc zip gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi python3 python-is-python3 git wget curl
        sudo apt-get install -y clang-18 lld-18

    - name: Apply SUSFS Patch
      run: |
        git clone --depth=1 -b kernel-4.19 https://gitlab.com/simonpunk/susfs4ksu.git susfs
        cp susfs/kernel_patches/fs/susfs.c fs/
        cp susfs/kernel_patches/include/linux/susfs.h include/linux/
        patch -p1 < susfs/kernel_patches/50_add_susfs_in_kernel-4.19.patch
        echo "✅ SUSFS patch applied"

    - name: Build Kernel
      run: |
        export PATH=/usr/lib/llvm-18/bin:$PATH
        export ARCH=arm64
        export KBUILD_BUILD_USER="fandi"
        export KBUILD_BUILD_HOST="kerenpandi71"

        ARGS="O=out ARCH=arm64 \
          CC=clang-18 \
          LD=ld.lld-18 \
          AR=llvm-ar \
          NM=llvm-nm \
          STRIP=llvm-strip \
          OBJCOPY=llvm-objcopy \
          OBJDUMP=llvm-objdump \
          CROSS_COMPILE=aarch64-linux-gnu- \
          CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
          LLVM=1 \
          LLVM_IAS=1"

        # Step 1: Load defconfig
        make $ARGS ${{ github.event.inputs.defconfig }}

        # Step 2: Resolve dependencies
        make $ARGS olddefconfig

        # Step 3: Tambah config SETELAH olddefconfig
        printf '%s\n' \
          'CONFIG_IPC_NS=y' \
          'CONFIG_SUSFS=y' \
          'CONFIG_KSU_SUSFS=y' \
          'CONFIG_DEVTMPFS=y' \
          'CONFIG_DEVTMPFS_MOUNT=y' \
          'CONFIG_POSIX_MQUEUE=y' \
          'CONFIG_SYSVIPC=y' \
          'CONFIG_TCP_CONG_BBR=y' \
          'CONFIG_DEFAULT_TCP_CONG=bbr' \
          'CONFIG_IKCONFIG=y' \
          'CONFIG_IKCONFIG_PROC=y' \
          >> out/.config

        # Step 4: Verifikasi config
        echo "=== Verifikasi Config ==="
        grep -E "CONFIG_IPC_NS|CONFIG_SUSFS|CONFIG_TCP_CONG_BBR|CONFIG_IKCONFIG" out/.config

        # Step 5: Build
        make -j$(nproc) $ARGS 2>&1 | tee compile.log

    - name: Verify Features
      run: |
        CONFIG=out/.config
        check() {
          grep -q "^${2}=y" $CONFIG \
            && echo "  [✓] $1" \
            || echo "  [✗] $1"
        }
        echo "=============================="
        echo "  KERNEL FEATURE CHECKER"
        echo "=============================="
        echo "--- DroidSpaces ---"
        check "IPC Namespace"    CONFIG_IPC_NS
        check "PID Namespace"    CONFIG_PID_NS
        check "Net Namespace"    CONFIG_NET_NS
        check "OverlayFS"        CONFIG_OVERLAY_FS
        check "devtmpfs"         CONFIG_DEVTMPFS
        check "FUSE"             CONFIG_FUSE_FS
        echo "--- Security ---"
        check "SUSFS"            CONFIG_SUSFS
        check "Seccomp"          CONFIG_SECCOMP
        echo "--- Network ---"
        check "WireGuard"        CONFIG_WIREGUARD
        check "TUN/TAP"          CONFIG_TUN
        check "BBR TCP"          CONFIG_TCP_CONG_BBR
        echo "--- Performance ---"
        check "zRAM"             CONFIG_ZRAM
        check "LZ4"              CONFIG_LZ4_COMPRESS
        check "schedutil"        CONFIG_CPU_FREQ_GOV_SCHEDUTIL
        echo "--- Debug/Config ---"
        check "IKCONFIG_PROC"    CONFIG_IKCONFIG_PROC
        echo "=============================="

    - name: Packing Anykernel3
      run: |
        if [ ! -f out/arch/arm64/boot/Image ]; then
          cp out/arch/arm64/boot/Image.gz out/arch/arm64/boot/Image || true
        fi

        if [ -f out/arch/arm64/boot/Image ]; then
          git clone https://github.com/AbuRider/Anykernel3 Anykernel3
          cp out/arch/arm64/boot/Image Anykernel3/
          cp out/arch/arm64/boot/dts/mediatek/mt6768.dtb Anykernel3/dtb || true
          cp out/arch/arm64/boot/dts/mediatek/earth.dtbo Anykernel3/dtbo || true
          cd Anykernel3
          zip -r9 "../${{ github.event.inputs.zipname }}-$(date +%Y%m%d).zip" * -x '.git*'
          cd ..
          echo "✅ Zip berhasil dibuat"
        else
          echo "❌ Image tidak ditemukan"
          exit 1
        fi

    - name: Upload Artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: Build-Result
        path: |
          *.zip
          compile.log
          out/.config
